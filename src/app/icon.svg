<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#050506"/>

  <!-- headphone arc -->
  <path
    d="M8 17.5 C8 12.2 11.6 8 16 8 C20.4 8 24 12.2 24 17.5"
    stroke="#c8a45c"
    stroke-width="2"
    stroke-linecap="round"
    fill="none"
  />

  <!-- left ear cup -->
  <rect x="5.5" y="17" width="4" height="6.5" rx="2" fill="#c8a45c"/>

  <!-- right ear cup -->
  <rect x="22.5" y="17" width="4" height="6.5" rx="2" fill="#c8a45c"/>

  <!-- subtle inner glow on arc -->
  <path
    d="M9.5 18.5 C9.5 14 12.5 10.5 16 10.5 C19.5 10.5 22.5 14 22.5 18.5"
    stroke="#c8a45c"
    stroke-width="0.6"
    stroke-linecap="round"
    stroke-opacity="0.35"
    fill="none"
  />
</svg>
