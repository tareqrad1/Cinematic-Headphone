<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!-- dark background -->
  <rect width="180" height="180" rx="40" fill="#050506"/>

  <!-- subtle gold ambient glow -->
  <ellipse cx="90" cy="110" rx="60" ry="40" fill="#c8a45c" fill-opacity="0.07"/>

  <!-- headphone arc -->
  <path
    d="M42 100 C42 68 63 44 90 44 C117 44 138 68 138 100"
    stroke="#c8a45c"
    stroke-width="10"
    stroke-linecap="round"
    fill="none"
  />

  <!-- inner arc highlight -->
  <path
    d="M52 101 C52 74 69 52 90 52 C111 52 128 74 128 101"
    stroke="#c8a45c"
    stroke-width="3"
    stroke-linecap="round"
    stroke-opacity="0.3"
    fill="none"
  />

  <!-- left ear cup -->
  <rect x="28" y="96" width="22" height="38" rx="11" fill="#c8a45c"/>
  <!-- left cup inner highlight -->
  <rect x="32" y="102" width="10" height="18" rx="5" fill="#f0d898" fill-opacity="0.25"/>

  <!-- right ear cup -->
  <rect x="130" y="96" width="22" height="38" rx="11" fill="#c8a45c"/>
  <!-- right cup inner highlight -->
  <rect x="138" y="102" width="10" height="18" rx="5" fill="#f0d898" fill-opacity="0.25"/>
</svg>
